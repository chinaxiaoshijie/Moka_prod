# ========================================
# Docker Compose for Moka Interview Management System
# Production-ready deployment configuration
# ========================================

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: moka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moka_password}
      POSTGRES_DB: ${POSTGRES_DB:-moka_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moka}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moka-network

  # ========================================
  # Backend API (NestJS)
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: moka-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-13001}:13001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-moka}:${POSTGRES_PASSWORD:-moka_password}@postgres:5432/${POSTGRES_DB:-moka_db}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bunx", "curl", "-f", "http://localhost:13001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - moka-network
    volumes:
      - backend-uploads:/app/uploads

  # ========================================
  # Frontend (Next.js + Nginx)
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: moka-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-13000}:13000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-/api}
    depends_on:
      backend:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s
    networks:
      - moka-network

  # ========================================
  # Nginx Reverse Proxy (Optional - for SSL termination)
  # ========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: moka-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "${NGINX_PORT:-80}:80"
  #     - "${NGINX_SSL_PORT:-443}:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - moka-network

# ========================================
# Networks
# ========================================
networks:
  moka-network:
    driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
  postgres_data:
    driver: local
  backend-uploads:
    driver: local
