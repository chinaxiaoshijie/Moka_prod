services:
  mysql:
    image: mysql:8.0
    container_name: interview-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: interview_system_2024
      MYSQL_DATABASE: interview_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: interview_system
      DB_USER: root
      DB_PASSWORD: interview_system_2024
      JWT_SECRET: your-production-jwt-secret-key-change-me-please
      JWT_EXPIRES: 7d
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX: 100
      UPLOAD_MAX_SIZE: 10485760
      UPLOAD_PATH: ./uploads
    ports:
      - "8080:3000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview-frontend
    restart: unless-stopped
    ports:
      - "80:3001"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password_2024

volumes:
  mysql_data:
  backend_uploads:
  backend_logs:
  redis_data:
