<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书账号绑定</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: white; border-radius: 16px; padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; max-width: 400px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #667eea; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block; padding: 12px 32px; border-radius: 8px;
      background: #667eea; color: white; text-decoration: none;
      font-size: 14px; font-weight: 500; border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #5a6fd6; }
    .success .icon { color: #4caf50; }
    .error .icon { color: #f44336; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <div class="icon" id="icon" style="display:none;"></div>
    <div class="title" id="title">正在绑定飞书账号...</div>
    <div class="subtitle" id="subtitle">请稍候，系统正在处理您的授权请求</div>
    <button class="btn" id="btn" style="display:none;" onclick="window.close()">关闭页面</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");

    async function bind() {
      if (error) {
        showError(error === "access_denied" ? "您取消了授权" : "授权失败");
        return;
      }
      if (!code || !state) {
        showError("缺少必要参数");
        return;
      }

      try {
        const res = await fetch("/api/auth/feishu/callback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, state }),
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showSuccess(data.name || "飞书账号");
        } else {
          showError(data.message || "绑定失败");
        }
      } catch (e) {
        showError("网络错误，请重试");
      }
    }

    function showSuccess(name) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("icon").style.display = "block";
      document.getElementById("icon").textContent = "✅";
      document.getElementById("title").textContent = "绑定成功！";
      document.getElementById("subtitle").textContent = `飞书账号 "${name}" 已绑定成功`;
      document.getElementById("btn").style.display = "inline-block";
      document.getElementById("card").classList.add("success");

      // Notify parent window
      try { window.opener.postMessage({ type: "feishu-bind-success" }, "*"); } catch(e) {}
    }

    function showError(msg) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("icon").style.display = "block";
      document.getElementById("icon").textContent = "❌";
      document.getElementById("title").textContent = "绑定失败";
      document.getElementById("subtitle").textContent = msg;
      document.getElementById("btn").style.display = "inline-block";
      document.getElementById("card").classList.add("error");

      try { window.opener.postMessage({ type: "feishu-bind-error" }, "*"); } catch(e) {}
    }

    bind();
  </script>
</body>
</html>
